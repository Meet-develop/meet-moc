name: UI Screenshot Check

# UIファイルが変更されたPRでのみ実行
on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "public/**"

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── シークレット確認 ──
      # 未設定の場合はコメントだけ残して終了
      - name: Check required secrets
        id: check
        env:
          _URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          _KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$_URL" ] || [ -z "$_KEY" ]; then
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Post "secrets not configured" comment
        if: steps.check.outputs.ok == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          BODY="## 📸 UIスクリーンショット\n\n⚠️ GitHub Secrets が未設定のため自動撮影をスキップしました。\n\n**Settings → Secrets and variables → Actions** で以下を登録してください:\n\n| Secret名 | 説明 |\n|---|---|\n| \`NEXT_PUBLIC_SUPABASE_URL\` | Supabase プロジェクト URL |\n| \`NEXT_PUBLIC_SUPABASE_ANON_KEY\` | Supabase anon key |\n| \`GOOGLE_PLACES_API_KEY\` | Google Places API キー（任意）|\n\nまたはローカルで手動撮影:\n\`\`\`bash\ndocker compose up -d\nbash .claude/scripts/screenshot-pr.sh --pr ${PR_NUMBER} --urls \"/\"\n\`\`\`"
          curl -s -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"body\": $(echo -e "$BODY" | jq -Rs .)}" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/comments"

      # ── .env ファイルを生成（docker compose が自動で読み込む）──
      # env: ブロックで受け取ることでシークレット値がシェル展開されない
      - name: Create .env for Docker Compose
        if: steps.check.outputs.ok == 'true'
        env:
          _SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          _SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          _GOOGLE_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          _LINE_PROVIDER: ${{ secrets.NEXT_PUBLIC_SUPABASE_LINE_PROVIDER }}
          _LINE_BOT_PROMPT: ${{ secrets.NEXT_PUBLIC_LINE_BOT_PROMPT }}
        run: |
          printf '%s\n' \
            "NEXT_PUBLIC_SUPABASE_URL=${_SUPABASE_URL}" \
            "NEXT_PUBLIC_SUPABASE_ANON_KEY=${_SUPABASE_ANON_KEY}" \
            "GOOGLE_PLACES_API_KEY=${_GOOGLE_KEY}" \
            "NEXT_PUBLIC_SUPABASE_LINE_PROVIDER=${_LINE_PROVIDER:-custom:line}" \
            "NEXT_PUBLIC_LINE_BOT_PROMPT=${_LINE_BOT_PROMPT:-aggressive}" \
            "APP_ORIGIN=http://localhost:3000" \
            "SEED_ON_STARTUP=true" \
            > .env

      # ── Docker Compose でアプリを起動 ──
      - name: Start services
        if: steps.check.outputs.ok == 'true'
        run: docker compose up -d --build

      # ── アプリ起動待機（最大3分）──
      - name: Wait for app to be ready
        if: steps.check.outputs.ok == 'true'
        run: |
          echo "Waiting for app..."
          for i in $(seq 1 36); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$STATUS" != "000" ]; then
              echo "App responded with HTTP $STATUS"
              break
            fi
            echo "Attempt $i/36 (no response yet)..."
            sleep 5
          done
          # 200/500どちらでも「アプリが起動した」と判断してスクリーンショットを撮る
          FINAL=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
          if [ "$FINAL" = "000" ]; then
            docker compose logs app --tail=50
            echo "::error::App failed to start"
            exit 1
          fi

      # ── Node.js と Playwright をホスト側にインストール ──
      # (スクリーンショットはホストから localhost:3000 に接続して撮影する)
      - name: Setup Node.js
        if: steps.check.outputs.ok == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright
        if: steps.check.outputs.ok == 'true'
        run: |
          # playwright パッケージをホスト側にインストール
          npm install playwright
          # Chromium ブラウザバイナリと Linux 依存ライブラリをインストール
          npx playwright install chromium --with-deps

      # ── スクリーンショット撮影 ──
      - name: Take screenshots
        if: steps.check.outputs.ok == 'true'
        run: node .claude/scripts/ci-screenshot.js

      # ── GitHub PR にコメントとして投稿 ──
      - name: Post screenshots to PR
        if: steps.check.outputs.ok == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          SCREENSHOT_DIR="/tmp/screenshots"
          API="https://api.github.com"
          UPLOAD_API="https://uploads.github.com"

          upload_image() {
            local file="$1" name="$2"
            curl -sf -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: image/png" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              --data-binary "@$file" \
              "${UPLOAD_API}/repos/${REPO}/issues/${PR_NUMBER}/assets?name=${name}" \
              | jq -r '.browser_download_url // empty'
          }

          # manifest.json から撮影済みファイルを読み取る
          if [ ! -f "$SCREENSHOT_DIR/manifest.json" ]; then
            echo "::warning::manifest.json not found, skipping upload"
            exit 0
          fi

          # テーブルヘッダー
          ROWS=""
          while IFS= read -r line; do
            NAME=$(echo "$line" | jq -r '.name')
            FILE=$(echo "$line" | jq -r '.path')
            if [ -f "$FILE" ]; then
              URL=$(upload_image "$FILE" "${NAME}.png")
              if [ -n "$URL" ]; then
                ROWS+="| \`/${NAME}\` | ![]($URL) |\n"
              else
                ROWS+="| \`/${NAME}\` | アップロード失敗 |\n"
              fi
            fi
          done < <(jq -c '.[]' "$SCREENSHOT_DIR/manifest.json")

          if [ -z "$ROWS" ]; then
            BODY="## 📸 UIスクリーンショット（自動撮影）\n\n撮影または画像のアップロードに失敗しました。\nローカルで \`.claude/scripts/screenshot-pr.sh\` を実行してください。"
          else
            BODY="## 📸 UIスクリーンショット（自動撮影）\n\n| ページ | スマートフォン (390px) |\n|:---|:---:|\n${ROWS}\n> 認証が必要なページは \`.claude/scripts/screenshot-pr.sh --pr ${PR_NUMBER} --urls \"/events/EVENT_ID\"\` で追加できます。"
          fi

          # 既存コメントを更新 or 新規投稿
          EXISTING_ID=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${API}/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            | jq -r '.[] | select(.body | startswith("## 📸 UIスクリーンショット")) | .id' | head -1)

          BODY_JSON=$(printf '%b' "$BODY" | jq -Rs .)

          if [ -n "$EXISTING_ID" ]; then
            curl -s -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"body\": $BODY_JSON}" \
              "${API}/repos/${REPO}/issues/comments/${EXISTING_ID}" > /dev/null
            echo "Updated existing screenshot comment"
          else
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"body\": $BODY_JSON}" \
              "${API}/repos/${REPO}/issues/${PR_NUMBER}/comments" > /dev/null
            echo "Posted new screenshot comment"
          fi

      - name: Cleanup
        if: always()
        run: docker compose down --volumes 2>/dev/null || true
