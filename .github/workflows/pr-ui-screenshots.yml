name: UI Screenshot Check

# UI ファイルが変更された PR でのみ実行
on:
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "public/**"
      - ".claude/screenshot-targets.json"
      - ".claude/scripts/ci-screenshot.js"

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 変更ファイル一覧を取得 ──
      - name: Compute changed files
        id: changed
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          echo "Base: $BASE_SHA"
          echo "Head: $HEAD_SHA"

          {
            echo 'files<<__EOF__'
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- app components public
            echo '__EOF__'
          } >> "$GITHUB_OUTPUT"

          CHANGED_COUNT=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" -- app components public | wc -l | tr -d ' ')
          echo "count=$CHANGED_COUNT" >> "$GITHUB_OUTPUT"
          echo "変更された UI ファイル: $CHANGED_COUNT 件"

      # ── 変更ファイルが0件なら早期終了 ──
      - name: Skip if no UI changes
        if: steps.changed.outputs.count == '0'
        run: echo "::notice::UI ファイルの変更がないためスキップします"

      # ── .env を生成（Supabase は CI 用ダミー値） ──
      - name: Create .env for Docker Compose
        if: steps.changed.outputs.count != '0'
        run: |
          printf '%s\n' \
            "NEXT_PUBLIC_SUPABASE_URL=http://localhost:54321" \
            "NEXT_PUBLIC_SUPABASE_ANON_KEY=ci-dummy-anon-key" \
            "GOOGLE_PLACES_API_KEY=" \
            "NEXT_PUBLIC_SUPABASE_LINE_PROVIDER=custom:line" \
            "NEXT_PUBLIC_LINE_BOT_PROMPT=aggressive" \
            "APP_ORIGIN=http://localhost:3000" \
            "SEED_ON_STARTUP=true" \
            > .env

      # ── Docker Compose でアプリ起動（シード込み）──
      - name: Start services
        if: steps.changed.outputs.count != '0'
        run: docker compose up -d --build

      # ── アプリ起動待機（最大3分）──
      - name: Wait for app to be ready
        if: steps.changed.outputs.count != '0'
        run: |
          echo "Waiting for app..."
          for i in $(seq 1 36); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
            if [ "$STATUS" != "000" ]; then
              echo "App responded with HTTP $STATUS"
              break
            fi
            echo "Attempt $i/36 (no response yet)..."
            sleep 5
          done
          FINAL=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 || echo "000")
          if [ "$FINAL" = "000" ]; then
            docker compose logs app --tail=80
            echo "::error::App failed to start"
            exit 1
          fi

      # ── Node.js / Playwright / sharp を /tmp にインストール (Docker と権限が衝突しないよう project 外へ) ──
      - name: Setup Node.js
        if: steps.changed.outputs.count != '0'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Playwright & sharp
        if: steps.changed.outputs.count != '0'
        run: |
          npm install --prefix /tmp/pw playwright sharp
          npx --prefix /tmp/pw playwright install chromium --with-deps

      # ── スクリーンショット撮影 ──
      - name: Take screenshots
        if: steps.changed.outputs.count != '0'
        env:
          NODE_PATH: /tmp/pw/node_modules
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
          APP_URL: http://localhost:3000
          SUPABASE_URL: http://localhost:54321
        run: node .claude/scripts/ci-screenshot.js

      # ── スクショを ci-screenshots ブランチに push して画像URLを得る ──
      - name: Upload screenshot to ci-screenshots branch
        id: upload
        if: steps.changed.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          SCREENSHOT_DIR="/tmp/screenshots"
          if [ ! -f "$SCREENSHOT_DIR/manifest.json" ]; then
            echo "image_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMBINED=$(jq -r '.combined // empty' "$SCREENSHOT_DIR/manifest.json")
          if [ -z "$COMBINED" ] || [ ! -f "$COMBINED" ]; then
            echo "image_url=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORK_DIR=$(mktemp -d)
          cd "$WORK_DIR"

          # ci-screenshots ブランチが既にあれば clone、なければ orphan で初期化
          if git ls-remote --exit-code --heads "$REPO_URL" ci-screenshots > /dev/null 2>&1; then
            git clone --branch ci-screenshots --depth 1 --single-branch "$REPO_URL" repo
            cd repo
          else
            git clone --depth 1 "$REPO_URL" repo
            cd repo
            git checkout --orphan ci-screenshots
            git rm -rf . > /dev/null 2>&1 || true
            printf '# CI Screenshots\n\nPR ごとの自動 UI スクリーンショット置き場（github-actions[bot] が管理）。\n' > README.md
            git add README.md
            git commit -m "ci: init ci-screenshots branch"
          fi

          IMG_NAME="pr-${PR_NUMBER}-$(date +%s).png"
          cp "$COMBINED" "$IMG_NAME"
          git add "$IMG_NAME"
          git commit -m "ci: screenshot for PR #${PR_NUMBER}"

          # リトライ込みでプッシュ（並列実行衝突対策）
          for attempt in 1 2 3; do
            if git push origin ci-screenshots; then
              break
            fi
            echo "push failed (attempt $attempt), pulling and retrying..."
            git pull --rebase origin ci-screenshots || true
            sleep 2
          done

          SHA=$(git rev-parse HEAD)
          IMG_URL="https://raw.githubusercontent.com/${REPO}/${SHA}/${IMG_NAME}"
          echo "image_url=${IMG_URL}" >> "$GITHUB_OUTPUT"
          echo "Image URL: ${IMG_URL}"

      # ── PR にコメント投稿 ──
      - name: Post screenshots to PR
        if: steps.changed.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          IMAGE_URL: ${{ steps.upload.outputs.image_url }}
        run: |
          SCREENSHOT_DIR="/tmp/screenshots"
          API="https://api.github.com"

          if [ ! -f "$SCREENSHOT_DIR/manifest.json" ]; then
            echo "::warning::manifest.json not found, skipping"
            exit 0
          fi

          SKIPPED=$(jq -r '.skipped // false' "$SCREENSHOT_DIR/manifest.json")
          REASON=$(jq -r '.reason // ""' "$SCREENSHOT_DIR/manifest.json")
          ITEMS_COUNT=$(jq -r '.items | length' "$SCREENSHOT_DIR/manifest.json")

          # ── 本文の組み立て ──
          if [ "$SKIPPED" = "true" ]; then
            if [ "$REASON" = "no-ui-changes" ]; then
              BODY="## 📸 UIスクリーンショット\n\nこの PR の変更には、撮影対象として登録されている UI ファイルが含まれていません。\n対象を追加する場合は \`.claude/screenshot-targets.json\` を編集してください。"
            else
              BODY="## 📸 UIスクリーンショット\n\nUIファイルの変更が検出されませんでした。"
            fi
          elif [ "$ITEMS_COUNT" = "0" ]; then
            BODY="## 📸 UIスクリーンショット\n\n撮影に失敗しました。アプリのログを確認してください。"
          else
            LABELS=$(jq -r '[.items[].label] | join(" / ")' "$SCREENSHOT_DIR/manifest.json")
            if [ -n "$IMAGE_URL" ]; then
              BODY="## 📸 UIスクリーンショット（自動撮影 / スマホ 390px）\n\n**変更箇所**: ${LABELS}\n\n![](${IMAGE_URL})\n\n> 認証が必要なページは \`.claude/scripts/screenshot-pr.sh --pr ${PR_NUMBER} --urls \"/events/EVENT_ID\"\` で追加できます。"
            else
              BODY="## 📸 UIスクリーンショット\n\n画像のアップロードに失敗しました。"
            fi
          fi

          # ── 既存コメントを更新 or 新規投稿 ──
          EXISTING_ID=$(curl -s \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "${API}/repos/${REPO}/issues/${PR_NUMBER}/comments" \
            | jq -r '.[] | select(.body | startswith("## 📸 UIスクリーンショット")) | .id' | head -1)

          BODY_JSON=$(printf '%b' "$BODY" | jq -Rs .)

          if [ -n "$EXISTING_ID" ]; then
            curl -s -X PATCH \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"body\": $BODY_JSON}" \
              "${API}/repos/${REPO}/issues/comments/${EXISTING_ID}" > /dev/null
            echo "Updated existing screenshot comment"
          else
            curl -s -X POST \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -d "{\"body\": $BODY_JSON}" \
              "${API}/repos/${REPO}/issues/${PR_NUMBER}/comments" > /dev/null
            echo "Posted new screenshot comment"
          fi

      - name: Cleanup
        if: always()
        run: docker compose down --volumes 2>/dev/null || true
