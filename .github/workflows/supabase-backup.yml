name: Supabase DB Backup

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Optional note for the backup run"
        required: false
        type: string
  schedule:
    - cron: "0 3 * * *"

permissions:
  contents: read

concurrency:
  group: supabase-backup-production
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL 17 client
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ca-certificates curl gnupg
          sudo install -d -m 0755 /usr/share/keyrings
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | gpg --dearmor | sudo tee /usr/share/keyrings/postgresql.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/postgresql.gpg] http://apt.postgresql.org/pub/repos/apt $(. /etc/os-release && echo ${VERSION_CODENAME})-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list > /dev/null
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends postgresql-client-17

      - name: Run Supabase backup
        env:
          DATABASE_URL: ${{ secrets.PROD_DIRECT_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BACKUP_BUCKET: ${{ secrets.SUPABASE_BACKUP_BUCKET }}
          SUPABASE_BACKUP_RETENTION_COUNT: "14"
          SUPABASE_BACKUP_PREFIX: production
          BACKUP_REASON: ${{ github.event.inputs.reason }}
          GITHUB_SHA: ${{ github.sha }}
        run: npm run backup:supabase
