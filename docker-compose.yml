services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/meet_moc"
      DIRECT_URL: "postgresql://postgres:postgres@db:5432/meet_moc"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: "${NEXT_PUBLIC_SUPABASE_URL}"
      NEXT_PUBLIC_SUPABASE_ANON_KEY: "${NEXT_PUBLIC_SUPABASE_ANON_KEY}"
      GOOGLE_PLACES_API_KEY: "${GOOGLE_PLACES_API_KEY}"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    command: >-
      sh -c "
      if [ ! -d node_modules/.bin ]; then npm ci; fi
      && npm run db:generate
      && until npm run db:migrate; do
        echo 'Waiting for database...'
        sleep 2
      done
      && if [ "${SEED_ON_STARTUP:-false}" = "true" ]; then npm run db:seed; fi
      && npm run dev -- --hostname 0.0.0.0 --port 3000
      "
    networks:
      - app_net

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: "meet_moc"
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meet_moc"]
      interval: 3s
      timeout: 3s
      retries: 20
      start_period: 5s
    networks:
      - app_net

volumes:
  db_data:

networks:
  app_net:
    name: meet-moc-app-net
